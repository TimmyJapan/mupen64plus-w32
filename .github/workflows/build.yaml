name: Build Mupen64Plus Win32

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            make
            git
            mingw-w64-i686-gcc
            mingw-w64-i686-SDL2
            mingw-w64-i686-freetype
            mingw-w64-i686-libpng
            mingw-w64-i686-zlib
            nasm
            pkg-config
      - name: Build All Components
        shell: msys2 {0}
        run: |
          ROOT_DIR=$(pwd)
          DIST_DIR=$ROOT_DIR/dist
          mkdir -p $DIST_DIR
          
          # 1. Core のビルド
          echo ">>> Building Core..."
          cd $ROOT_DIR/source/mupen64plus-core/projects/unix
          make all OS=MINGW ARCH=i686 HOST_CPU=i686 \
            CC=i686-w64-mingw32-gcc CXX=i686-w64-mingw32-g++ \
            VULKAN=0 -j$(nproc)
          cp mupen64plus.dll $DIST_DIR/
          
          # 2. Plugins のビルド
          CORE_INC=$ROOT_DIR/source/mupen64plus-core/src/api
          COMPONENTS=(
            "mupen64plus-input-sdl"
            "mupen64plus-rsp-hle"
            "mupen64plus-video-rice"
          )

          for COMP in "${COMPONENTS[@]}"; do
            echo ">>> Building $COMP..."
            # ループの度に ROOT_DIR から移動することで迷子を防ぐ
            cd $ROOT_DIR/source/$COMP/projects/unix
            make all OS=MINGW ARCH=i686 HOST_CPU=i686 \
              CC=i686-w64-mingw32-gcc CXX=i686-w64-mingw32-g++ \
              APIDIR=$CORE_INC VULKAN=0 -j$(nproc)
            cp *.dll $DIST_DIR/ 2>/dev/null || :
          done
          
          # 3. UI (Console) のビルド
          echo ">>> Building UI Console..."
          cd $ROOT_DIR/source/mupen64plus-ui-console/projects/unix
          
          # 修正：エラー時に Windows のエラーコードを表示するように main.c を改造
          sed -i '1i #include <windows.h>' ../../src/main.c
          sed -i '1i #include <stdio.h>' ../../src/main.c
          # LoadLibrary 失敗時にエラー番号を標準出力に出す
          sed -i 's/LoadLibrary(path);/({ HMODULE h = LoadLibrary(path); if(!h) printf("DEBUG: LoadLibrary Error Code: %lu\\n", GetLastError()); h; });/g' ../../src/main.c

          make all OS=MINGW ARCH=i686 HOST_CPU=i686 \
            CC=i686-w64-mingw32-gcc CXX=i686-w64-mingw32-g++ \
            APIDIR=$CORE_INC \
            COREDIR="." \
            LDFLAGS="-static-libgcc -static-libstdc++" \
            -j$(nproc)

          cp mupen64plus.exe $DIST_DIR/
          
          # --- 依存DLLのコピー（ここを強化） ---
          # 32bitで必須となるランタイムを漏らさず収集
          cp /mingw32/bin/SDL2.dll $DIST_DIR/
          cp /mingw32/bin/zlib1.dll $DIST_DIR/
          cp /mingw32/bin/libpng16-16.dll $DIST_DIR/
          cp /mingw32/bin/libfreetype-6.dll $DIST_DIR/
          cp /mingw32/bin/libgcc_s_dw2-1.dll $DIST_DIR/
          cp /mingw32/bin/libstdc++-6.dll $DIST_DIR/
          cp /mingw32/bin/libwinpthread-1.dll $DIST_DIR/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mupen64plus-win32-binaries
          path: dist/
