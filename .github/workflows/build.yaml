name: Build Mupen64Plus x86 Windows (vcxproj)

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup SDL2 x86
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://www.libsdl.org/release/SDL2-devel-2.28.5-VC.zip" -OutFile "SDL2.zip"
          Expand-Archive -Path "SDL2.zip" -DestinationPath "SDL2_dev"
          # Move the DLL to a place where the final bundle can grab it
          mkdir build_output
          copy SDL2_dev/SDL2-2.28.5/lib/x86/SDL2.dll build_output/

      - name: Build Mupen64Plus Core
        run: msbuild source/mupen64plus-core/projects/msvc/mupen64plus-core.vcxproj /p:Configuration=Release /p:Platform=Win32

      - name: Build Rice Video Plugin
        run: msbuild source/mupen64plus-video-rice/projects/msvc/mupen64plus-video-rice.vcxproj /p:Configuration=Release /p:Platform=Win32

      - name: Build Input SDL
        run: msbuild source/mupen64plus-input-sdl/projects/msvc/mupen64plus-input-sdl.vcxproj /p:Configuration=Release /p:Platform=Win32

      - name: Build RSP HLE
        run: msbuild source/mupen64plus-rsp-hle/projects/msvc/mupen64plus-rsp-hle.vcxproj /p:Configuration=Release /p:Platform=Win32

      - name: Build Console UI
        run: msbuild source/mupen64plus-ui-console/projects/msvc/mupen64plus-ui-console.vcxproj /p:Configuration=Release /p:Platform=Win32

      - name: Finalize Bundle
        run: |
          copy source/mupen64plus-ui-console/projects/msvc/Release/*.exe build_output/
          copy source/mupen64plus-core/projects/msvc/Release/*.dll build_output/
          copy source/mupen64plus-video-rice/projects/msvc/Release/*.dll build_output/
          copy source/mupen64plus-input-sdl/projects/msvc/Release/*.dll build_output/
          copy source/mupen64plus-rsp-hle/projects/msvc/Release/*.dll build_output/

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: mupen64plus-win32-rice-ready-to-run
          path: build_output/
