name: Build Mupen64Plus Win32

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            make
            git
            mingw-w64-i686-gcc
            mingw-w64-i686-SDL2
            mingw-w64-i686-freetype
            mingw-w64-i686-libpng
            mingw-w64-i686-zlib
            nasm
            pkg-config

      - name: Build All Components
        shell: msys2 {0}
        run: |
          ROOT_DIR=$(pwd)
          DIST_DIR=$ROOT_DIR/dist
          mkdir -p $DIST_DIR
          
          # 1. Core のビルド
          echo ">>> Building Core..."
          cd $ROOT_DIR/source/mupen64plus-core/projects/unix
          
          # 32bit特有の読み込みエラーを回避するため、gcc/stdc++を静的に埋め込みつつ、
          # SDL2が必要とするWindows標準ライブラリを明示的にリンクします
          make all OS=MINGW ARCH=i686 HOST_CPU=i686 \
            CC=i686-w64-mingw32-gcc CXX=i686-w64-mingw32-g++ \
            VULKAN=0 \
            LDFLAGS="-static-libgcc -static-libstdc++ -lwinmm -imm32 -lole32 -loleaut32 -lsetupapi -lversion -luuid" \
            -j$(nproc)

          cp mupen64plus.dll $DIST_DIR/
          
          # 2. Plugins のビルド
          CORE_INC=$ROOT_DIR/source/mupen64plus-core/src/api
          
          COMPONENTS=(
            "mupen64plus-input-sdl"
            "mupen64plus-rsp-hle"
            "mupen64plus-video-rice"
          )

          for COMP in "${COMPONENTS[@]}"; do
            echo ">>> Building $COMP..."
            cd $ROOT_DIR/source/$COMP/projects/unix
            # プラグイン側にも HOST_CPU=i686 を追加
            make all OS=MINGW ARCH=i686 HOST_CPU=i686 CC=i686-w64-mingw32-gcc CXX=i686-w64-mingw32-g++ APIDIR=$CORE_INC VULKAN=0 -j$(nproc)
            cp *.dll $DIST_DIR/ 2>/dev/null || :
          done
          # 3. UI (Console) のビルド
          echo ">>> Patching and Building UI Console..."
          cd $ROOT_DIR/source/mupen64plus-ui-console/projects/unix
          
          # 物理的に絶対パスの参照を消去するパッチ
          # main.c 内の LoadLibrary 呼び出し部分から絶対パス変数を排除します
          sed -i 's/COREDIR "//g' ../../src/main.c
          sed -i 's/", "mupen64plus.dll"/"mupen64plus.dll"/g' ../../src/main.c

          # 念のため Makefile のデフォルト定義も完全に破壊します
          make all OS=MINGW ARCH=i686 HOST_CPU=i686 \
            CC=i686-w64-mingw32-gcc CXX=i686-w64-mingw32-g++ \
            APIDIR=$CORE_INC \
            COREDIR=. LIBDIR=. SHAREDIR=. \
            -j$(nproc)

          cp mupen64plus.exe $DIST_DIR/
          
          # MSYS2のbinから必要なDLLをコピー（名前の微差をワイルドカードで吸収）
          cp /mingw32/bin/SDL2.dll $DIST_DIR/
          cp /mingw32/bin/zlib1.dll $DIST_DIR/
          cp /mingw32/bin/libpng*.dll $DIST_DIR/
          cp /mingw32/bin/libfreetype*.dll $DIST_DIR/
          
          # もし libgcc 関連でエラーが出るならこれも追加
          cp /mingw32/bin/libgcc_s_*.dll $DIST_DIR/ || :
          cp /mingw32/bin/libstdc++-*.dll $DIST_DIR/ || :
          cp /mingw32/bin/libwinpthread-*.dll $DIST_DIR/ || :

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mupen64plus-win32-binaries
          path: dist/
