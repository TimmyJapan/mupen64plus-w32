name: Build Mupen64Plus Win32

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            mingw-w64-i686-toolchain
            mingw-w64-i686-SDL2
            mingw-w64-i686-libpng
            mingw-w64-i686-freetype
            mingw-w64-i686-zlib
            make

      - name: Build All Components
        shell: msys2 {0}
        run: |
          ROOT_DIR=$(pwd)
          DIST_DIR=$ROOT_DIR/dist
          mkdir -p $DIST_DIR

          # 1. Core „Āģ„Éď„Éę„ÉČ
          echo ">>> Building Core..."
          cd $ROOT_DIR/source/mupen64plus-core/projects/unix
          # HOST_CPU=i686 „āíŤŅĹŚä†„Āó„Ā¶„ÄĀx86_64„ā≥„Éľ„ÉČ„ĀģŤ™§ÁąÜ„āíťė≤„Āź
          make all OS=MINGW ARCH=i686 HOST_CPU=i686 CC=i686-w64-mingw32-gcc CXX=i686-w64-mingw32-g++ VULKAN=0
          cp mupen64plus.dll $DIST_DIR/
          
          # 2. Plugins „Āģ„Éď„Éę„ÉČ
          CORE_INC=$ROOT_DIR/source/mupen64plus-core/src/api
          
          COMPONENTS=(
            "mupen64plus-input-sdl"
            "mupen64plus-rsp-hle"
            "mupen64plus-video-rice"
          )

          for COMP in "${COMPONENTS[@]}"; do
            echo ">>> Building $COMP..."
            cd $ROOT_DIR/source/$COMP/projects/unix
            # „Éó„É©„āį„ā§„É≥ŚĀī„Āę„āā HOST_CPU=i686 „āíŤŅĹŚä†
            make all OS=MINGW ARCH=i686 HOST_CPU=i686 CC=i686-w64-mingw32-gcc CXX=i686-w64-mingw32-g++ APIDIR=$CORE_INC VULKAN=0
            cp *.dll $DIST_DIR/ 2>/dev/null || :
          done

          # 3. UI (Console) „Āģ„Éď„Éę„ÉČ
          echo ">>> Building UI Console..."
          cd $ROOT_DIR/source/mupen64plus-ui-console/projects/unix
          make all OS=MINGW ARCH=i686 HOST_CPU=i686 CC=i686-w64-mingw32-gcc CXX=i686-w64-mingw32-g++ APIDIR=$CORE_INC COREDIR=$DIST_DIR/
          cp mupen64plus.exe $DIST_DIR/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mupen64plus-win32-binaries
          path: dist/