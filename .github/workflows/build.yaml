name: Build Mupen64Plus Win32

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            mingw-w64-i686-toolchain
            mingw-w64-i686-SDL2
            mingw-w64-i686-libpng
            mingw-w64-i686-freetype
            mingw-w64-i686-zlib
            make

      - name: Build All Components
        shell: msys2 {0}
        run: |
          # 各ディレクトリを巡回してビルド
          COMPONENTS=(
            "mupen64plus-core"
            "mupen64plus-input-sdl"
            "mupen64plus-rsp-hle"
            "mupen64plus-video-rice"
            "mupen64plus-ui-console"
          )

          mkdir -p ./dist

          for COMP in "${COMPONENTS[@]}"; do
            echo "Building $COMP..."
            cd "source/$COMP/projects/unix"
            
            # Win32ターゲット、最適化、APIディレクトリの指定
            # Mupen64PlusのMakefile標準引数を利用
            make OS=MINGW ARCH=i686 CC=i686-w64-mingw32-gcc CXX=i686-w64-mingw32-g++
            
            # 生成された .dll または .exe を dist フォルダにコピー
            cp *.dll ../../../../dist/ 2>/dev/null || :
            cp *.exe ../../../../dist/ 2>/dev/null || :
            
            cd ../../../../
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mupen64plus-win32-binaries
          path: dist/